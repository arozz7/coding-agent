models:
  - name: qwen3.5-35b-a3b
    type: local
    provider: lmstudio   # lmstudio | ollama | llama_cpp
    # Set LM_STUDIO_URL in .env to override; falls back to localhost:1234
    endpoint: ${LM_STUDIO_URL:-http://127.0.0.1:1234}
    context_window: 262144
    is_coding_optimized: true
    recommended_for: [coding, code_review, test_generation, planning, research]
    rate_limit_rpm: 120

  - name: google_gemma-4-31b-it
    type: local
    provider: lmstudio
    endpoint: ${LM_STUDIO_URL:-http://127.0.0.1:1234}
    context_window: 109148
    is_coding_optimized: true
    recommended_for: [coding, code_review, test_generation, planning, research]
    rate_limit_rpm: 120

  - name: google/gemma-4-26b-a4b
    type: local
    provider: lmstudio
    endpoint: ${LM_STUDIO_URL:-http://127.0.0.1:1234}
    context_window: 109148
    is_coding_optimized: true
    recommended_for: [coding, code_review, test_generation, planning, research]
    rate_limit_rpm: 120

  - name: gemma-4-31b-it
    type: local
    provider: lmstudio
    endpoint: ${LM_STUDIO_URL:-http://127.0.0.1:1234}
    context_window: 109148
    is_coding_optimized: true
    recommended_for: [coding, code_review, test_generation, planning, research]
    rate_limit_rpm: 120
    
    
  # ---- OpenRouter models (set OPENROUTER_API_KEY in .env to activate) ----
  # OpenRouter speaks the OpenAI-compatible /v1/chat/completions API.
  # Use any model slug from https://openrouter.ai/models as the `name`.
  - name: google/gemma-4-31b-it:free
    type: remote
    endpoint: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    context_window: 262144
    is_coding_optimized: true
    recommended_for: [coding, code_review, planning, research, chat]
    rate_limit_rpm: 60

  - name: google/gemma-4-26b-a4b-it:free
    type: remote
    endpoint: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    context_window: 262144
    is_coding_optimized: true
    recommended_for: [coding, code_review, planning, research, chat]
    rate_limit_rpm: 60

  - name: openai/gpt-oss-120b:free
    type: remote
    endpoint: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    context_window: 131100
    is_coding_optimized: true
    recommended_for: [coding, code_review, planning, research, chat]
    rate_limit_rpm: 60
    
  - name: minimax/minimax-m2.5:free
    type: remote
    endpoint: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    context_window: 196000
    is_coding_optimized: true
    recommended_for: [coding, code_review, planning, research, chat]
    rate_limit_rpm: 60

  - name: openrouter/free
    type: remote
    endpoint: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    context_window: 200000
    is_coding_optimized: true
    recommended_for: [coding, code_review, planning, research, chat]
    rate_limit_rpm: 60

rate_limiting:
  global_rpm: 100
  burst_allowance: 1.5
  backoff_multiplier: 2
  max_backoff_seconds: 60

defaults:
  coding_model: qwen3.5-35b-a3b
  planning_model: google_gemma-4-31b-it
  fallback_model: openai/gpt-oss-120b:free

  # Local model runtime behaviour.
  # single_model_only: true — unload any other loaded local model before
  #   loading a new one.  Recommended for machines with limited VRAM.
  #   Set to false if you have enough VRAM for multiple models.
  # load_timeout_secs: how long to poll after triggering a load before
  #   giving up and falling back to remote.
  # load_poll_interval_secs: how often to check if the model is loaded.
  # max_load_attempts: how many load+poll cycles before switching to remote.
  local_runtime:
    single_model_only: true
    load_timeout_secs: 300
    load_poll_interval_secs: 10
    max_load_attempts: 2
