models:
  - name: qwen3.5-35b-a3b
    type: local
    # Set LM_STUDIO_URL in .env to override; falls back to localhost:1234
    endpoint: ${LM_STUDIO_URL:-http://127.0.0.1:1234}
    context_window: 262144
    is_coding_optimized: true
    recommended_for: [coding, code_review, test_generation, planning, research]
    rate_limit_rpm: 120

  - name: google_gemma-4-31b-it
    type: local
    endpoint: ${LM_STUDIO_URL:-http://127.0.0.1:1234}
    context_window: 262144
    is_coding_optimized: true
    recommended_for: [coding, code_review, test_generation, planning, research]
    rate_limit_rpm: 120
    
  # ---- OpenRouter models (uncomment and set OPENROUTER_API_KEY in .env) ----
  # OpenRouter speaks the OpenAI-compatible /v1/chat/completions API.
  # Use any model slug from https://openrouter.ai/models as the `name`.
  #
  # - name: anthropic/claude-sonnet-4-5
  #   type: remote
  #   endpoint: https://openrouter.ai/api/v1
  #   api_key_env: OPENROUTER_API_KEY
  #   context_window: 200000
  #   is_coding_optimized: true
  #   recommended_for: [coding, code_review, planning, research, chat]
  #   rate_limit_rpm: 60
  #
  # - name: openai/gpt-4o
  #   type: remote
  #   endpoint: https://openrouter.ai/api/v1
  #   api_key_env: OPENROUTER_API_KEY
  #   context_window: 128000
  #   is_coding_optimized: true
  #   recommended_for: [coding, planning, chat]
  #   rate_limit_rpm: 60

rate_limiting:
  global_rpm: 100
  burst_allowance: 1.5
  backoff_multiplier: 2
  max_backoff_seconds: 60

defaults:
  coding_model: google_gemma-4-31b-it
  planning_model: qwen3.5-35b-a3b
  fallback_model: google_gemma-4-31b-it
